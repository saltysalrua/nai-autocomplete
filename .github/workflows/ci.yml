name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build and validate bundles
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build modular bundles
        run: node scripts/build-modular.mjs

      - name: Validate manifest
        run: node -e "const manifest = require('./manifest.json'); if (!manifest.version) throw new Error('manifest.json is missing version');"
